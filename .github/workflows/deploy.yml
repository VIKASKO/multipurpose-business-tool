name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002

          script: |
            cd /home/u772638765/domains/olive-stinkbug-485761.hostingersite.com/public_html

            # Force sync with GitHub (explicitly set remote URL to avoid stale/misconfigured origin)
            git remote set-url origin https://${{ secrets.DEPLOY_TOKEN }}@github.com/VIKASKO/multipurpose-business-tool.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Install/update dependencies
            composer install --no-interaction --prefer-dist --optimize-autoloader

            # Create .env from GitHub Secrets if provided, else fall back to example
            if [ -n "${{ secrets.DB_DATABASE }}" ]; then
              cat > .env <<EOT
APP_NAME=${{ secrets.APP_NAME }}
APP_ENV=${{ secrets.APP_ENV }}
APP_KEY=${{ secrets.APP_KEY }}
APP_DEBUG=${{ secrets.APP_DEBUG }}
APP_URL=${{ secrets.APP_URL }}

DB_CONNECTION=${{ secrets.DB_CONNECTION }}
DB_HOST=${{ secrets.DB_HOST }}
DB_PORT=${{ secrets.DB_PORT }}
DB_DATABASE=${{ secrets.DB_DATABASE }}
DB_USERNAME=${{ secrets.DB_USERNAME }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}

BROADCAST_DRIVER=log
CACHE_DRIVER=file
QUEUE_CONNECTION=database
SESSION_DRIVER=file
EOT
            else
              cp .env.example .env || true
            fi

            # Ensure APP_KEY is present
            php artisan key:generate --force || true

            # Ensure writable directories
            chmod -R 775 storage bootstrap/cache || true

            # Laravel optimizations (no DB changes)
            php artisan config:cache
            php artisan queue:restart
