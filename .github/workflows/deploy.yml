name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002

          script: |
            cd /home/u772638765/domains/olive-stinkbug-485761.hostingersite.com/public_html

            # Ensure correct repository
            git remote set-url origin https://${{ secrets.DEPLOY_TOKEN }}@github.com/VIKASKO/multipurpose-business-tool.git

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Remove untracked files except for critical Laravel directories and .env
            git clean -fd -e .env -e storage -e bootstrap/cache -e vendor

            # Install dependencies
            composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

            # Ensure required directories are writable
            chmod -R 775 storage bootstrap/cache || true

            # Clear old caches
            php artisan optimize:clear

            # Rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart queue workers only if using queues
            php artisan queue:restart || true